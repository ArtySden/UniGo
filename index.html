<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicia sesión</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="login-page">
        <div class="status-bar">
        </div>

        <section class="login-content">
            <div class="logo-box">UG</div>

            <h1>Inicia sesión</h1>
            <p class="subtitle">Tu vida universitaria organizada</p>

            <input type="text" id="usuario" class="input-email" placeholder="Correo Electrónico">

            <button class="btn-main" onclick="iniciarSesion()">Continuar</button>

            <div class="divider">o</div>

            <div class="social-buttons">
                <button class="social-btn">Continuar con Google</button>
                <button class="social-btn">Continuar con Outlook</button>
            </div>
        </section>

        <footer class="footer">
            Términos de Uso y Política de privacidad
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
